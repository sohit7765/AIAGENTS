name: Playwright Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    timeout-minutes: 60
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        browser: [chromium, firefox]
        include:
          - os: ubuntu-latest
            browser: webkit
          - os: windows-latest
            browser: webkit

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Install Playwright browsers
      run: playwright install --with-deps ${{ matrix.browser }}

    - name: Run Playwright tests
      run: pytest tests/ --browser ${{ matrix.browser }} --headed=false -v --junitxml=test-results/junit-${{ matrix.browser }}.xml
      env:
        BROWSER_TYPE: ${{ matrix.browser }}
        HEADLESS: true

    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results-${{ matrix.os }}-${{ matrix.browser }}
        path: |
          screenshots/
          test-results/
        retention-days: 30

  test-e2e:
    timeout-minutes: 30
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Install Playwright browsers
      run: playwright install --with-deps

    - name: Run E2E Registration Tests
      run: pytest tests/test_registration_e2e.py -v --tb=short --junitxml=test-results/junit-e2e.xml
      env:
        HEADLESS: true

    - name: Upload E2E screenshots
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: e2e-screenshots
        path: screenshots/
        retention-days: 7